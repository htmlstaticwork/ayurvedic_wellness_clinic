<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Ayurvedic Wellness Clinic</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,600;0,700;1,600&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap-grid.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/bootstrap-grid.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
    <link rel="stylesheet" href="assets/css/animations.css">
</head>

<body style="background-color: var(--bg-color);">
    <div style="position: fixed; top: 2rem; right: 2rem; display: flex; gap: 1rem; z-index: 1000;">
        <button id="rtl-toggle" class="btn-theme-toggle" aria-label="Toggle RTL mode">RTL</button>
        <button id="theme-toggle" class="btn-theme-toggle" aria-label="Toggle dark mode">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
    </div>

    <div class="container py-5">
        <!-- Brand Name centered at top -->
        <div class="text-center mb-5 reveal">
            <a href="index.html" class="logo justify-content-center">
                <svg width="40" height="40" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16 2L19.5 9.5H12.5L16 2Z" fill="var(--primary-color)" />
                    <path d="M16 30L12.5 22.5H19.5L16 30Z" fill="var(--primary-color)" />
                    <path d="M30 16L22.5 19.5V12.5L30 16Z" fill="var(--primary-color)" />
                    <path d="M2 16L9.5 12.5V19.5L2 16Z" fill="var(--primary-color)" />
                    <circle cx="16" cy="16" r="6" fill="var(--accent-color)" />
                </svg>
                <span style="font-size: 1.5rem;">AyuWellness</span>
            </a>
        </div>

        <div class="mx-auto reveal"
            style="max-width: 550px; min-height: 75vh; display: flex; flex-direction: column; justify-content: center;">
            <div class="text-center mb-5">
                <h1 class="mb-2">Create Your Profile</h1>
                <p class="text-secondary small">Begin your journey to holistic balance and wellness today.</p>
            </div>

            <form class="card p-5 shadow-lg border-0"
                style="background-color: var(--surface-color); border-radius: 28px;">
                <div class="row g-4">
                    <div class="col-12">
                        <label class="small fw-bold">First Name</label>
                        <input type="text" class="newsletter-input w-100 mt-1" required>
                    </div>
                    <div class="col-12">
                        <label class="small fw-bold">Last Name</label>
                        <input type="text" class="newsletter-input w-100 mt-1" required>
                    </div>
                    <div class="col-12">
                        <label class="small fw-bold">Email Address</label>
                        <input type="email" class="newsletter-input w-100 mt-1" placeholder="your@example.com" required>
                    </div>
                    <div class="col-12">
                        <label class="small fw-bold">Set Password</label>
                        <input type="password" class="newsletter-input w-100 mt-1" placeholder="At least 8 characters"
                            required>
                    </div>
                    <div class="col-12">
                        <label class="small text-secondary">
                            <input type="checkbox" checked> I agree to the <a href="#"
                                class="text-primary fw-bold">Terms & Privacy Policy</a>.
                        </label>
                    </div>
                    <div class="col-12 mt-2">
                        <button type="submit" class="btn btn-primary w-100 py-3">Register Account</button>

                        <div class="divider">OR</div>

                        <div class="row g-3">
                            <div class="col-6">
                                <button type="button" class="btn-social">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path
                                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                            fill="#4285F4" />
                                        <path
                                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                            fill="#34A853" />
                                        <path
                                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                                            fill="#FBBC05" />
                                        <path
                                            d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                            fill="#EA4335" />
                                    </svg>
                                    Google
                                </button>
                            </div>
                            <div class="col-6">
                                <button type="button" class="btn-social">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path
                                            d="M12.152 6.896c-.548 0-1.711-.516-2.822-.516-1.447 0-2.776.825-3.52 2.124-1.491 2.603-.38 6.45 1.066 8.53.712 1.02 1.554 2.162 2.658 2.124 1.054-.047 1.458-.684 2.738-.684 1.272 0 1.637.684 2.756.666 1.144-.018 1.874-1.033 2.57-2.043.805-1.168 1.137-2.3 1.156-2.355-.025-.011-2.215-.848-2.24-3.374-.025-2.115 1.734-3.125 1.815-3.178-.988-1.444-2.518-1.61-3.064-1.642-1.411-.114-2.483.542-2.913.542zm1.617-2.91a2.81 2.81 0 00.672-1.986c0-.17-.015-.34-.045-.504a2.926 2.926 0 00-2.067 1.077c-.55.632-.9 1.545-.762 2.454.17.012.333.023.495.023a2.7 2.7 0 001.707-.7z" />
                                    </svg>
                                    Apple
                                </button>
                            </div>
                        </div>

                        <p class="text-center small mt-4 text-secondary">
                            Already a member? <a href="login.html" class="text-primary fw-bold">Log in here</a>
                        </p>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="assets/js/theme-toggle.js"></script>
    <script src="assets/js/animations.js"></script>
</body>

</html>
